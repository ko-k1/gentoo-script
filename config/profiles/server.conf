# Server profile overrides
PLATFORM="server"
INIT_SYSTEM="openrc"

USE_ADD="systemd udev"
USE_REMOVE="X alsa pulseaudio pipewire bluetooth cups"

OPTIMIZATION_LEVEL="O2"
MAKEOPTS="auto"

KERNEL_TYPE="gentoo-kernel-bin"

INSTALL_DESKTOP="no"
DESKTOP_ENV="none"
DISPLAY_SERVER="none"

ENABLE_CCACHE="no"
ENABLE_BINHOST="yes"
ENABLE_DISTCC="no"

BOOTLOADER="grub"
