# Hyprland desktop profile overrides
PLATFORM="desktop"
INIT_SYSTEM="openrc"

USE_ADD="X alsa pulseaudio pipewire udev dbus networkmanager"
USE_REMOVE=""

OPTIMIZATION_LEVEL="O2"
MAKEOPTS="auto"

KERNEL_TYPE="gentoo-kernel-bin"

INSTALL_DESKTOP="yes"
DESKTOP_ENV="hyprland"
DISPLAY_SERVER="wayland"
HYPRLAND_DM="sddm"
HYPRLAND_USE_OVERLAY="yes"

ENABLE_CCACHE="yes"
ENABLE_BINHOST="yes"
ENABLE_DISTCC="no"

BOOTLOADER="grub"
