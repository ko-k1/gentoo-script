#!/usr/bin/env bash
#
# config/user.conf - User override template
#
# Copy this file and edit the values you want to change.
# All values from config/defaults.conf can be overridden here.
# Only uncomment and change the ones you need.
#

# ============================================================
# REQUIRED: Set your target disk
# ============================================================
TARGET_DISK="sda"
# TARGET_DISK="nvme0n1"

# ============================================================
# ARCHITECTURE & PLATFORM
# ============================================================
ARCH="amd64"
# ARCH="aarch64"

# PLATFORM="desktop"
PLATFORM="laptop"
# PLATFORM="server"

# ============================================================
# INIT SYSTEM
# ============================================================
INIT_SYSTEM="openrc"
# INIT_SYSTEM="systemd"

# ============================================================
# FILESYSTEM
# ============================================================
# ROOT_FS="ext4"
ROOT_FS="btrfs"
# ROOT_FS="xfs"
# ROOT_FS="zfs"

# ============================================================
# STAGE3 (leave empty for auto-detect)
# ============================================================
STAGE3_URL="https://distfiles.gentoo.org/releases/amd64/autobuilds/20260503T164604Z/stage3-amd64-openrc-20260503T164604Z.tar.xz"
# STAGE3_PATH="/path/to/local/stage3.tar.zst"

# ============================================================
# OPTIMIZATION
# ============================================================
OPTIMIZATION_LEVEL="O2"
# CFLAGS_EXTRA="-fno-plt -fno-stack-protector"
# MAKEOPTS="-j17"

# ============================================================
# KERNEL
# ============================================================
KERNEL_TYPE="gentoo-sources"
# KERNEL_VERSION="6.6.21"

# ============================================================
# PORTAGE
# ============================================================
# USE_ADD="-cups -bluetooth"
# USE_REMOVE=""
# ACCEPT_KEYWORDS_EXTRA="app-misc/foo ~amd64"
SYNC_TYPE="git"
# SYNC_TYPE="rsync"

# ============================================================
# ACCELERATION
# ============================================================
# ENABLE_CCACHE="yes"
# CCACHE_SIZE="20G"
# ENABLE_BINHOST="yes"
# BINHOST_URL="http://your-binhost/packages"
# ENABLE_DISTCC="no"
# DISTCC_HOSTS="192.168.1.100 192.168.1.101"

# ============================================================
# DESKTOP
# ============================================================
INSTALL_DESKTOP="yes"
DESKTOP_ENV="hyprland"
DISPLAY_SERVER="wayland"
HYPRLAND_WM="sddm"
HYPRLAND_USE_OVERLAY="yes"

# ============================================================
# SYSTEM
# ============================================================
HOSTNAME="gentoo"
TIMEZONE="Asia/Tokyo"
LOCALE="en_US.UTF-8"
ROOT_PASSWORD="koki"
EXTRA_USERS="koki"

# ============================================================
# BOOTLOADER
# ============================================================
BOOTLOADER="grub"
# BOOTLOADER="systemd-boot"
EFI_INSTALL="yes"
