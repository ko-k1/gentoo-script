#!/usr/bin/env bash
#
# config/defaults.conf - Default values for all installation options
#
# Edit config/user.conf to override these values.
#

# ============================================================
# BASIC SETTINGS
# ============================================================

# Target architecture: amd64, aarch64
ARCH="amd64"

# Platform type: desktop, laptop, server
PLATFORM="desktop"

# Init system: openrc, systemd
INIT_SYSTEM="openrc"

# Installation target disk (e.g., sda, nvme0n1)
TARGET_DISK=""

# Filesystem type for root: ext4, btrfs, xfs, zfs
ROOT_FS="ext4"

# ============================================================
# STAGE3 SETTINGS
# ============================================================

# Stage3 URL (empty = auto-detect from Gentoo mirrors)
STAGE3_URL=""

# Stage3 local file path (empty = download from URL)
STAGE3_PATH=""

# Mirror URL for auto-detection
MIRROR_URL="https://distfiles.gentoo.org/releases"

# ============================================================
# OPTIMIZATION SETTINGS
# ============================================================

# Optimization level: O2 (balanced), O3 (aggressive), Os (size)
OPTIMIZATION_LEVEL="O2"

# CFLAGS extra (appended to defaults)
CFLAGS_EXTRA=""

# MAKEOPTS: auto = -j(N+1), or set manually (e.g., -j9)
MAKEOPTS="auto"

# EMERGE_DEFAULT_OPTS extra
EMERGE_DEFAULT_OPTS_EXTRA=""

# ============================================================
# KERNEL SETTINGS
# ============================================================

# Kernel type: gentoo-sources, gentoo-kernel-bin
KERNEL_TYPE="gentoo-kernel-bin"

# Kernel version (empty = latest)
KERNEL_VERSION=""

# ============================================================
# PORTAGE SETTINGS
# ============================================================

# USE flags to add (space-separated)
USE_ADD=""

# USE flags to remove (space-separated)
USE_REMOVE=""

# Additional package.accept_keywords (package:keyword pairs)
ACCEPT_KEYWORDS_EXTRA=""

# Portage license accept (empty = accept default)
LICENSE_ACCEPT=""

# Portage sync type: git, rsync
SYNC_TYPE="git"

# ============================================================
# ACCELERATION SETTINGS
# ============================================================

# Enable ccache: yes, no
ENABLE_CCACHE="yes"

# ccache size (e.g., 5G, 10G)
CCACHE_SIZE="10G"

# Enable binary packages: yes, no
ENABLE_BINHOST="yes"

# Binary package host URL (for getbinpkg)
BINHOST_URL=""

# Enable distcc: yes, no
ENABLE_DISTCC="no"

# Distcc hosts (space-separated, e.g., "host1 host2")
DISTCC_HOSTS=""

# ============================================================
# DESKTOP SETTINGS
# ============================================================

# Install desktop environment: yes, no
INSTALL_DESKTOP="no"

# Desktop environment: gnome, kde, xfce, hyprland, sway, none
DESKTOP_ENV="none"

# Display server: x11, wayland, auto
DISPLAY_SERVER="auto"

# Hyprland display manager: greetd, sddm, none
HYPRLAND_DM="sddm"

# Use hyproverlay overlay (wiki recommended): yes, no
HYPRLAND_USE_OVERLAY="yes"

# ============================================================
# SYSTEM SETTINGS
# ============================================================

# Hostname
HOSTNAME="gentoo"

# Timezone (e.g., Asia/Tokyo, US/Eastern)
TIMEZONE="UTC"

# Locale (e.g., en_US.UTF-8)
LOCALE="en_US.UTF-8"

# Root password (empty = prompt during install)
ROOT_PASSWORD=""

# Additional users to create (space-separated usernames)
EXTRA_USERS=""

# ============================================================
# BOOTLOADER SETTINGS
# ============================================================

# Bootloader: grub, systemd-boot, none
BOOTLOADER="grub"

# Install to EFI partition: auto, yes, no
EFI_INSTALL="auto"
