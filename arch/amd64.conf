# AMD64 architecture-specific settings
ARCH_NAME="amd64"
STAGE3_ARCH="amd64"

# Default CFLAGS for amd64
CFLAGS_BASE="-march=native -O2 -pipe"
CXXFLAGS_BASE="-march=native -O2 -pipe"

# CPU flags for amd64
CPU_FLAGS_VAR="CPU_FLAGS_X86"

# Common AMD64 CPU flags (script will detect actual flags)
CPU_FLAGS_DEFAULT="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 sse4a ssse3"

# Portage profile base
PROFILE_BASE="default/linux/amd64"

# GRUB target for amd64
GRUB_PLATFORMS="efi-64 pc"
