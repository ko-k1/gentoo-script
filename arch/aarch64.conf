# AArch64 architecture-specific settings
ARCH_NAME="aarch64"
STAGE3_ARCH="arm64"

# Default CFLAGS for aarch64
CFLAGS_BASE="-march=armv8-a+crc+crypto -O2 -pipe"
CXXFLAGS_BASE="-march=armv8-a+crc+crypto -O2 -pipe"

# CPU flags for aarch64
CPU_FLAGS_VAR="CPU_FLAGS_ARM"

# Common AArch64 CPU flags (script will detect actual flags)
CPU_FLAGS_DEFAULT="armv8 crc crypto edsp neon thumb vfp vfpv3 vfpv4 vfp-d32"

# Portage profile base
PROFILE_BASE="default/linux/arm64"

# GRUB not typically used on aarch64
GRUB_PLATFORMS=""
